name: roverdevkit
channels:
  - conda-forge
  - projectchrono
dependencies:
  - python=3.11
  - pip
  - numpy>=1.26
  - scipy>=1.11
  - pandas>=2.1
  - scikit-learn>=1.4
  - matplotlib>=3.8
  - plotly>=5.18
  - jupyterlab>=4.0
  - ipywidgets>=8.1
  - pyyaml>=6.0
  - tqdm>=4.66
  # PyChrono (Path 2 — SCM corrections). If install fails on macOS/ARM,
  # skip this line and work from the Path 1 analytical track.
  - projectchrono::pychrono
  - pip:
      - xgboost>=2.0
      - pymoo>=0.6.1
      - shap>=0.44
      - optuna>=3.5
      - pyDOE2>=1.3
      - pydantic>=2.5
      - torch>=2.2
      - -e .
